services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - ollama
      - github-mcp
    volumes:
      - ./policies:/app/policies

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "ollama serve & sleep 5 && ollama pull ${OLLAMA_MODEL:-qwen2.5:27b} && wait"

  github-mcp:
    image: ghcr.io/github/github-mcp-server:latest
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
    command: ["--transport", "sse", "--port", "3000"]
    ports:
      - "3000:3000"

volumes:
  ollama_data:
